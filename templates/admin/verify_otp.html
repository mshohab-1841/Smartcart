<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP — SmartCart</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .otp-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h4 {
            font-weight: bold;
            color: #1a1a2e;
            font-size: 22px;
        }

        .badge-admin {
            background-color: #e94560;
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .otp-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        .otp-card .subtitle {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: #1a1a2e;
            box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.15);
        }

        .btn-verify {
            width: 100%;
            padding: 11px;
            background-color: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-verify:hover {
            background-color: #e94560;
        }
    </style>
</head>

<body>

    <div class="otp-card">

        <!-- Brand -->
        <div class="brand">
            <h4>⚙️ SmartCart <span class="badge-admin">ADMIN</span></h4>
        </div>

        <h2>Verify OTP</h2>
        <p class="subtitle">Enter the OTP sent to your email and set a password.</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-danger py-2 px-3" style="font-size:13px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <!-- OTP Form -->
        <form method="POST" action="/verify-otp">

            <div class="mb-3">
                <label class="form-label">Enter OTP</label>
                <input type="text" name="otp" class="form-control" placeholder="Enter OTP" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Create Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn-verify">Verify & Register</button>

        </form>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
