<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup — SmartCart</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .signup-card .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .signup-card .brand h4 {
            font-weight: bold;
            color: #1a1a2e;
            font-size: 22px;
        }

        .signup-card .brand .badge-admin {
            background-color: #e94560;
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .signup-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: #1a1a2e;
            box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.15);
        }

        .btn-signup {
            width: 100%;
            padding: 11px;
            background-color: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn-signup:hover {
            background-color: #e94560;
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            background-color: transparent;
            color: #1a1a2e;
            border: 2px solid #1a1a2e;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background-color: #1a1a2e;
            color: white;
        }

        .divider {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin: 14px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #ddd;
        }

        .divider::before { left: 0; }
        .divider::after  { right: 0; }
    </style>
</head>

<body>

    <div class="signup-card">

        <!-- Brand -->
        <div class="brand">
            <h4>🛒 SmartCart <span class="badge-admin">ADMIN</span></h4>
        </div>

        <h2>Admin Registration</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-danger py-2 px-3" style="font-size:13px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <!-- Signup Form -->
        <form method="POST" action="/admin-signup">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn-signup">Send OTP</button>

        </form>

        <div class="divider mt-3">or</div>

        <!-- Login Button -->
        <form action="/admin-login">
            <button type="submit" class="btn-login">Already have an account? Login</button>
        </form>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
