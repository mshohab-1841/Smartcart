{% extends "user/base.html" %}

{% block title %}Page Title — SmartCart{% endblock %}

{% block extra_css %}
<style>
    /* page-specific CSS here */
</style>
{% endblock %}

{% block content %}
<div class="container">
    
    <!-- Bootstrap JS — add before </body> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <h2>Complete Your Payment</h2>
    
    <p>Total Amount: ₹{{ amount }}</p>
    
    <button id="rzp-button">Pay Now</button>
    
    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <!-- part of templates/user/payment.html -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <script>
        var options = {
            "key": "{{ key_id }}",
            "amount": "{{ amount * 100 }}",
            "currency": "INR",
            "name": "SmartCart",
            "description": "Order Payment",
            "order_id": "{{ order_id }}",
            "handler": function (response) {
                // Build a small form and POST to server for verification
                var form = document.createElement("form");
                form.method = "POST";
                form.action = "/verify-payment";
                
                var fields = {
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_signature: response.razorpay_signature
                };
                
                for (var name in fields) {
                    var input = document.createElement("input");
                    input.type = "hidden";
                    input.name = name;
                    input.value = fields[name];
                    form.appendChild(input);
                }
                
                document.body.appendChild(form);
                form.submit();
            },
            "prefill": {
                // optionally prefill user info
            }
        };
        
        var rzp = new Razorpay(options);
        document.getElementById('rzp-button').onclick = function (e) {
            rzp.open();
            e.preventDefault();
        }
        </script>


</div>
{% endblock %}
