{% extends "user/base.html" %}

{% block title %}{{ product.name }} — SmartCart{% endblock %}

{% block content %}
<div class="container py-4">

    <!-- Back Link -->
    <a href="/user/products" class="text-decoration-none mb-4 d-inline-block"
       style="color:#1a1a2e; font-size:14px; font-weight:600;">
        ← Back to Products
    </a>

    <!-- Product Card -->
    <div class="card border-0 shadow-sm p-4 mt-3" style="border-radius:16px;">
        <div class="row align-items-center">

            <!-- Product Image -->
            <div class="col-md-5 text-center mb-4 mb-md-0">
                <img src="/static/uploads/product_images/{{ product.image }}"
                     style="max-width:100%; max-height:300px; object-fit:contain;
                            border-radius:12px; border:1px solid #eee; padding:16px;">
            </div>

            <!-- Product Info -->
            <div class="col-md-7">

                <h2 class="fw-bold mb-2" style="color:#1a1a2e;">{{ product.name }}</h2>

                <span class="badge px-3 py-1 mb-3 d-inline-block"
                      style="background-color:#e8eaf6; color:#1a1a2e; font-size:13px; border-radius:20px;">
                    {{ product.category }}
                </span>

                <h3 class="fw-bold mb-3" style="color:#e94560; font-size:28px;">
                    ₹{{ product.price }}
                </h3>

                <p class="text-muted mb-4" style="font-size:15px; line-height:1.7;">
                    <strong class="text-dark">Description: </strong>{{ product.description }}
                </p>

                <hr class="mb-4">

                <!-- Add to Cart -->
                <form action="/user/add-to-cart/{{ product.product_id }}" method="GET">
                    <button type="submit" class="btn px-5 py-2 fw-semibold text-white"
                            style="background-color:#1a1a2e; border-radius:8px;
                                   font-size:15px; border:none; transition:background-color 0.2s;"
                            onmouseover="this.style.backgroundColor='#e94560'"
                            onmouseout="this.style.backgroundColor='#1a1a2e'">
                        🛒 Add to Cart
                    </button>
                </form>

            </div>
        </div>
    </div>

</div>
{% endblock %}
